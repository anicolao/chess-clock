name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Install dependencies
        run: nix develop -c npm ci

      - name: Verify Fontconfig Isolation
        run: nix develop -c fc-match sans-serif

      - name: Run Playwright tests
        run: |
          mkdir -p /tmp/empty_home
          env -u XDG_DATA_DIRS -u XDG_CONFIG_DIRS HOME=/tmp/empty_home nix develop -c "npm run test:e2e"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 30
