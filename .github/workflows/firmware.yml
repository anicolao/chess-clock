name: Firmware Tests

on:
  push:
    branches: [main, design-esp32-camera-testing]
  pull_request:
    branches: [main, design-esp32-camera-testing]
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build and Run Firmware Tests
        run: |
          nix develop -c bash -c "
            cd firmware
            mkdir -p build
            cd build
            cmake -GNinja ..
            ninja
            ctest --output-on-failure
          "
