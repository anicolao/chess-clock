name: Firmware Emulation Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build and Run Firmware Emulation Tests
        run: |
          nix develop -c bash -c "
            cd firmware
            echo 'Building ESP-IDF application (output redirected to build.log)...'
            idf.py build > build.log 2>&1 || (tail -n 100 build.log && exit 1)
            echo 'Running QEMU tests...'
            pytest --embedded-services idf,qemu --target esp32s3 test_app.py
          "
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: emulation-build-log
          path: firmware/build.log
