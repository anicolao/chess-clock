name: Firmware Unit Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build and Run Firmware Unit Tests
        run: |
          nix develop -c bash -c "
            cd firmware
            mkdir -p build_host
            cp CMakeLists_host.txt build_host/CMakeLists.txt
            cp -r components build_host/
            cd build_host
            echo 'Building unit tests (output redirected to build.log)...'
            cmake -GNinja . > build.log 2>&1 || (cat build.log && exit 1)
            ninja > build.log 2>&1 || (cat build.log && exit 1)
            echo 'Running unit tests...'
            ctest --output-on-failure
          "
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-build-log
          path: firmware/build_host/build.log
